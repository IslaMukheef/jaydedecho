<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- viewport-fit=cover fills iPhone notch/dynamic island area -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EchoFind</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #030a0e;
  --panel:   rgba(3,10,14,0.82);
  --border:  rgba(0,229,255,0.15);
  --accent:  #00e5ff;
  --warn:    #ffb300;
  --danger:  #ff3d3d;
  --success: #00e676;
  --dim:     #3a6070;
  --mono:    'Space Mono', monospace;
  --head:    'Syne', sans-serif;
  --r:       8px;
  /* safe areas for iPhone notch / home bar */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

html {
  height: 100%;
  /* prevent Safari rubber-band scroll */
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  height: 100%;
  height: -webkit-fill-available;
  background: var(--bg);
  color: #fff;
  font-family: var(--mono);
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ════════════════════════════ SETUP SCREEN ═════════════════════ */
#setup-screen {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: calc(var(--sat) + 24px) calc(var(--sar) + 24px) calc(var(--sab) + 24px) calc(var(--sal) + 24px);
  background: radial-gradient(ellipse at 50% 25%, #001f2d 0%, var(--bg) 65%);
  z-index: 10;
}

.logo {
  font-family: var(--head);
  font-size: clamp(2.8rem, 10vw, 4.5rem);
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.02em;
  text-shadow: 0 0 50px #00e5ff55;
  line-height: 1;
}
.logo span { color: #fff; }

.tagline {
  font-size: 0.7rem;
  color: var(--dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.card {
  background: rgba(10,26,34,0.9);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.field-label {
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 8px;
  display: block;
}

input[type="text"] {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 1.05rem;
  padding: 14px 16px;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--dim); font-size: 0.85rem; }

#start-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--r);
  font-family: var(--head);
  font-size: 1.1rem;
  font-weight: 700;
  padding: 18px;
  cursor: pointer;
  letter-spacing: 0.04em;
  width: 100%;
  -webkit-appearance: none;
  transition: opacity 0.15s, transform 0.1s;
  /* minimum 44px touch target */
  min-height: 56px;
}
#start-btn:active { transform: scale(0.97); opacity: 0.88; }

/* ════════════════════════════ GAME SCREEN ══════════════════════ */
#game-screen {
  position: fixed; inset: 0;
  display: none;
}

/* Camera fills the ENTIRE screen — it IS the background */
#camera {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  /* NOT dimmed — user needs to see where they are pointing */
}

/* Dark gradient at top and bottom for HUD legibility */
#game-screen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 28%),
    linear-gradient(to top,    rgba(0,0,0,0.80) 0%, transparent 45%);
  pointer-events: none;
  z-index: 2;
}

/* Scan-line texture */
#game-screen::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,229,255,0.025) 3px,
    rgba(0,229,255,0.025) 4px
  );
  pointer-events: none;
  z-index: 2;
}

/* Moving scan line */
#scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
  opacity: 0.5;
  top: 0;
  animation: scanMove 2.4s linear infinite;
  z-index: 3;
  pointer-events: none;
}
@keyframes scanMove { 0% { top: 0% } 100% { top: 100% } }

/* Corner brackets */
.corner {
  position: absolute;
  width: 24px; height: 24px;
  border-color: rgba(0,229,255,0.7);
  border-style: solid;
  z-index: 4;
  pointer-events: none;
}
.corner.tl { top: calc(var(--sat) + 60px); left: calc(var(--sal) + 14px); border-width: 2px 0 0 2px; }
.corner.tr { top: calc(var(--sat) + 60px); right: calc(var(--sar) + 14px); border-width: 2px 2px 0 0; }
.corner.bl { bottom: calc(var(--sab) + 160px); left: calc(var(--sal) + 14px); border-width: 0 0 2px 2px; }
.corner.br { bottom: calc(var(--sab) + 160px); right: calc(var(--sar) + 14px); border-width: 0 2px 2px 0; }

/* ── TOP BAR ──────────────────────────────────────────── */
#topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: calc(var(--sat) + 10px) calc(var(--sar) + 14px) 10px calc(var(--sal) + 14px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  z-index: 5;
}

.tb-logo {
  font-family: var(--head);
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.01em;
  text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  white-space: nowrap;
}

#target-badge {
  flex: 1;
  text-align: center;
  font-size: 0.65rem;
  background: rgba(0,229,255,0.12);
  border: 1px solid rgba(0,229,255,0.3);
  color: var(--accent);
  padding: 5px 12px;
  border-radius: 20px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

#stop-btn {
  background: rgba(255,61,61,0.15);
  border: 1px solid rgba(255,61,61,0.5);
  color: var(--danger);
  font-family: var(--mono);
  font-size: 0.62rem;
  padding: 7px 13px;
  border-radius: var(--r);
  cursor: pointer;
  letter-spacing: 0.06em;
  -webkit-appearance: none;
  min-height: 36px;
  min-width: 60px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: background 0.2s;
}
#stop-btn:active { background: rgba(255,61,61,0.35); }

/* ── CAM STATUS (centre) ──────────────────────────────── */
#cam-status {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--head);
  font-size: clamp(1.1rem, 4.5vw, 1.8rem);
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-align: center;
  text-shadow: 0 0 30px currentColor, 0 2px 12px rgba(0,0,0,0.8);
  z-index: 5;
  pointer-events: none;
  transition: color 0.25s;
  padding: 0 20px;
}

/* ── LOCK BANNER ──────────────────────────────────────── */
#lock-banner {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 6;
  background: rgba(0,0,0,0.35);
  pointer-events: none;
}
#lock-banner .dots {
  display: flex; gap: 8px;
}
#lock-banner .dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 0.6s ease infinite alternate;
}
#lock-banner .dot:nth-child(2) { animation-delay: 0.2s; }
#lock-banner .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { to { opacity: 0.15; transform: scale(0.7); } }
#lock-banner .lock-label {
  font-family: var(--head);
  font-size: clamp(0.85rem, 3.5vw, 1.1rem);
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-shadow: 0 0 20px var(--accent);
}

/* ── BOTTOM HUD ───────────────────────────────────────── */
#bottom-hud {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px calc(var(--sar) + 16px) calc(var(--sab) + 16px) calc(var(--sal) + 16px);
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Big feedback line */
#feedback-msg {
  font-family: var(--head);
  font-size: clamp(1.05rem, 4.5vw, 1.5rem);
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
  min-height: 2.6em;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  transition: color 0.25s;
}

/* Scene description */
#scene-desc {
  font-size: 0.72rem;
  color: rgba(200,221,230,0.7);
  line-height: 1.5;
  min-height: 1.1em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

/* Indicator pills */
#indicators {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}
.indicator {
  font-size: 0.58rem;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: all 0.3s;
  white-space: nowrap;
}
.ind-ok     { border-color: var(--success); color: var(--success); background: rgba(0,230,118,0.1); }
.ind-warn   { border-color: var(--warn);    color: var(--warn);    background: rgba(255,179,0,0.1); }
.ind-danger { border-color: var(--danger);  color: var(--danger);  background: rgba(255,61,61,0.1); }

/* Stats row */
#stats-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.58rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.06em;
}

/* ── URGENCY VIGNETTE ─────────────────────────────────── */
#urgency-ring {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 3;
  border-radius: 0;
  transition: box-shadow 0.3s, opacity 0.3s;
  opacity: 0;
}
#urgency-ring.warn    { box-shadow: inset 0 0 60px 10px rgba(255,179,0,0.35);   opacity: 1; }
#urgency-ring.danger  { box-shadow: inset 0 0 60px 10px rgba(255,61,61,0.45);   opacity: 1; animation: pulseD 0.45s ease infinite alternate; }
#urgency-ring.success { box-shadow: inset 0 0 60px 10px rgba(0,230,118,0.3);    opacity: 1; }
@keyframes pulseD { to { box-shadow: inset 0 0 80px 18px rgba(255,61,61,0.6); } }

/* ════════════════════════════ END SCREEN ═══════════════════════ */
#end-screen {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: calc(var(--sat) + 24px) calc(var(--sar) + 32px) calc(var(--sab) + 24px) calc(var(--sal) + 32px);
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 20;
}
#end-icon  { font-size: 3.5rem; }
#end-title {
  font-family: var(--head);
  font-size: clamp(2rem, 9vw, 3.2rem);
  font-weight: 800;
  text-align: center;
}
#end-msg {
  font-size: 0.82rem;
  color: rgba(200,221,230,0.65);
  text-align: center;
  max-width: 320px;
  line-height: 1.65;
}
#again-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--r);
  font-family: var(--head);
  font-size: 1rem;
  font-weight: 700;
  padding: 16px 40px;
  cursor: pointer;
  min-height: 54px;
  -webkit-appearance: none;
  transition: opacity 0.15s;
}
#again-btn:active { opacity: 0.8; }

canvas { display: none; }
</style>
</head>
<body>

<!-- ══════════════════════ SETUP ══════════════════════════════ -->
<div id="setup-screen">
  <div class="logo">Echo<span>Find</span></div>
  <div class="tagline">Navigate the world by AI &amp; sound</div>

  <div class="card">
    <div>
      <span class="field-label">What are you looking for?</span>
      <input type="text" id="target-input"
             placeholder="e.g. red coffee mug, laptop, door…"
             autocomplete="off" autocorrect="off" spellcheck="false"
             onkeydown="if(event.key==='Enter'){this.blur();startGame();}">
    </div>
    <button id="start-btn" onclick="startGame()">START GAME</button>
  </div>
</div>

<!-- ══════════════════════ GAME ════════════════════════════════ -->
<div id="game-screen">
  <video id="camera" autoplay playsinline muted></video>

  <!-- HUD layers -->
  <div id="scan-line"></div>
  <div id="urgency-ring"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="tb-logo">EchoFind</div>
    <div id="target-badge">—</div>
    <button id="stop-btn" onclick="endGame('stopped')">STOP</button>
  </div>

  <!-- Centre status -->
  <div id="cam-status">READY</div>

  <!-- Thinking lock overlay -->
  <div id="lock-banner">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="lock-label">Hold still — AI thinking…</div>
  </div>

  <!-- Bottom HUD -->
  <div id="bottom-hud">
    <div id="feedback-msg">Starting…</div>
    <div id="scene-desc"></div>
    <div id="indicators">
      <div class="indicator" id="ind-target">TARGET: ?</div>
      <div class="indicator" id="ind-person">PEOPLE: CLEAR</div>
      <div class="indicator" id="ind-obstacle">PATH: CLEAR</div>
    </div>
    <div id="stats-row">
      <span id="stat-frames">Frames: 0</span>
      <span id="stat-timer">0s</span>
      <span id="stat-latency"></span>
    </div>
  </div>
</div>

<!-- ══════════════════════ END ═════════════════════════════════ -->
<div id="end-screen">
  <div id="end-icon"></div>
  <div id="end-title"></div>
  <div id="end-msg"></div>
  <button id="again-btn" onclick="resetGame()">PLAY AGAIN</button>
</div>

<canvas id="snap-canvas"></canvas>

<script>
// ══ State ══════════════════════════════════════════════════════
const S = {
  // Server is the same origin — no URL to configure
  target:     '',
  running:    false,
  frames:     0,
  t0:         null,
  tick:       null,
  stream:     null,
};

// ══ DOM ════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const setupScreen = $('setup-screen');
const gameScreen  = $('game-screen');
const endScreen   = $('end-screen');
const video       = $('camera');
const canvas      = $('snap-canvas');

// ══ Prevent iOS scroll bounce ══════════════════════════════════
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ══ Start ══════════════════════════════════════════════════════
async function startGame() {
  const target = $('target-input').value.trim();
  if (!target) { speak('Please enter what you are looking for.'); return; }
  S.target = target;

  // Camera — prefer rear on mobile
  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' },
               width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = S.stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();
  } catch(e) {
    alert('Camera error: ' + e.message);
    return;
  }

  setupScreen.style.display = 'none';
  gameScreen.style.display  = 'block';
  endScreen.style.display   = 'none';

  S.running = true;
  S.frames  = 0;
  S.t0      = Date.now();

  $('target-badge').textContent = '🎯 ' + target.toUpperCase();
  setLocked(false);

  speak(`Game started. Looking for a ${target}. Hold still when I say to.`);

  // Clock display
  S.tick = setInterval(() => {
    if (!S.running) return;
    $('stat-timer').textContent   = Math.floor((Date.now()-S.t0)) + 'ms elapsed';
    $('stat-frames').textContent  = 'Frames: ' + S.frames;
  }, 500);

  loop();
}

// ══ Sequential loop ════════════════════════════════════════════
async function loop() {
  while (S.running) {

    // Phase 1 — tell user to hold still, then snap
    setLocked(true);
    setCamStatus('HOLD STILL…', 'var(--accent)');
    await sleep(400);
    if (!S.running) break;

    const img = captureFrame();
    if (!img) { await sleep(400); continue; }
    S.frames++;
    setCamStatus('AI THINKING…', 'var(--accent)');

    // Phase 2 — await full server response (no next frame until done)
    const t = Date.now();
    let data;
    try {
      const r = await fetch('/analyse', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ image: img, target: S.target }),
        signal:  AbortSignal.timeout(28000),
      });
      data = await r.json();
      $('stat-latency').textContent = (Date.now()-t) + 'ms';
    } catch(e) {
      setFeedback('⚠ Connection error — retrying…', 'warn');
      speak('Connection error. Retrying.');
      setLocked(false);
      await sleep(2000);
      continue;
    }

    if (!S.running) break;

    // Phase 3 — apply result
    if (data.ok) {
      const done = applyAnalysis(data.analysis);
      if (done) break;
    } else {
      setFeedback('Error: ' + data.error, 'warn');
      speak(data.error);
    }

    // Phase 4 — unlock, let user move, wait for speech to finish
    setLocked(false);
    setCamStatus('MOVE FREELY', 'var(--accent)');
    await waitForSpeech();
    if (!S.running) break;
    await sleep(500);
  }
}

// ══ Apply AI result ════════════════════════════════════════════
function applyAnalysis(a) {
  if (!S.running) return true;

  const urgency    = a.urgency || 'normal';
  const found      = !!a.target_found;
  const conf       = a.target_confidence || 0;
  const prox       = a.person_proximity || 'none';
  const personClose = prox === 'close' || prox === 'very_close';
  const personFar   = prox === 'far';
  const obs         = a.obstacles || [];
  const dir         = a.direction_hint || '';
  const scene       = a.scene_description || '';

  // Scene text
  $('scene-desc').textContent = scene;

  // Indicators
  setInd('ind-target',
    found ? (conf >= 70 ? 'ind-ok' : 'ind-warn') : '',
    found ? `TARGET: ${conf}%` : 'TARGET: SEARCHING');

  setInd('ind-person',
    personClose ? 'ind-danger' : personFar ? 'ind-warn' : '',
    a.person_detected ? `PERSON: ${prox.replace('_',' ').toUpperCase()}` : 'PEOPLE: CLEAR');

  setInd('ind-obstacle',
    obs.length ? 'ind-warn' : '',
    obs.length ? 'OBSTACLE: ' + obs[0].toUpperCase() : 'PATH: CLEAR');

  // Urgency vignette
  const ring = $('urgency-ring');
  ring.className = urgency === 'danger' ? 'danger' : urgency === 'warning' ? 'warn' : (found ? 'success' : '');

  // ── WIN
  if (found && conf >= 70) {
    setFeedback(`🎯 Found the ${S.target}!`, 'ok');
    setCamStatus('TARGET FOUND!', 'var(--success)');
    speak(`You found it! The ${S.target} is right in front of you. Well done!`);
    setTimeout(() => endGame('win'), 2500);
    return true;
  }

  // ── LOSE
  if (personClose) {
    setFeedback('🚨 STOP — person directly ahead!', 'danger');
    setCamStatus('DANGER', 'var(--danger)');
    speak('Stop! Person directly in front of you. Game over.');
    setTimeout(() => endGame('lose'), 2500);
    return true;
  }

  // ── Normal guidance
  let msg, speech;
  if (obs.length) {
    msg    = `⚠ Obstacle: ${obs[0]} — ${dir}`;
    speech = `Watch out, ${obs[0]} ahead. ${dir}`;
  } else if (personFar) {
    msg    = `👤 Person in distance — ${dir}`;
    speech = `Person in the distance. Proceed carefully. ${dir}`;
  } else if (found) {
    msg    = `🔍 Target glimpsed (${conf}%) — ${dir}`;
    speech = `I can see the ${S.target} at ${conf} percent. ${dir} to get closer.`;
  } else {
    msg    = dir ? `🔭 ${dir}` : '🔭 Keep scanning…';
    speech = dir ? `${dir}. Keep looking for the ${S.target}.`
                 : `Keep scanning. Looking for the ${S.target}.`;
  }

  const col = urgency === 'danger' ? 'danger' : urgency === 'warning' ? 'warn' : 'normal';
  setFeedback(msg, col);
  setCamStatus(urgency === 'danger' ? 'DANGER' : urgency === 'warning' ? 'CAUTION' : 'SCANNING',
               urgency === 'danger' ? 'var(--danger)' : urgency === 'warning' ? 'var(--warn)' : 'var(--accent)');
  speak(speech);
  return false;
}

// ══ Helpers ════════════════════════════════════════════════════
function captureFrame() {
  if (!video.videoWidth) return null;
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  // 0.55 quality keeps upload small while giving llava enough detail
  return canvas.toDataURL('image/jpeg', 0.55).split(',')[1];
}

function setLocked(on) {
  $('lock-banner').style.display = on ? 'flex' : 'none';
}

function setCamStatus(text, color) {
  const el = $('cam-status');
  el.textContent  = text;
  el.style.color  = color || 'var(--accent)';
}

function setFeedback(text, level) {
  const el = $('feedback-msg');
  el.textContent = text;
  el.style.color = level === 'danger' ? 'var(--danger)'
                 : level === 'warn'   ? 'var(--warn)'
                 : level === 'ok'     ? 'var(--success)'
                 : '#ffffff';
}

function setInd(id, cls, text) {
  const el = $(id);
  el.className = 'indicator' + (cls ? ' ' + cls : '');
  el.textContent = text;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function waitForSpeech() {
  return new Promise(res => {
    if (!window.speechSynthesis?.speaking) { res(); return; }
    const iv = setInterval(() => {
      if (!window.speechSynthesis.speaking) { clearInterval(iv); res(); }
    }, 120);
    setTimeout(() => { clearInterval(iv); res(); }, 9000);
  });
}

// Safari requires speech to be triggered from a user gesture first.
// We call a silent utterance on the start button tap.
let speechUnlocked = false;
function speak(text) {
  if (!window.speechSynthesis) return;
  if (!speechUnlocked) {
    // Unlock on first real call (which comes from user-gesture context via startGame)
    speechUnlocked = true;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate   = 1.08;
  u.pitch  = 1;
  u.volume = 1;
  window.speechSynthesis.speak(u);
}

// ══ End ════════════════════════════════════════════════════════
function endGame(reason) {
  S.running = false;
  clearInterval(S.tick);
  window.speechSynthesis?.cancel();
  S.stream?.getTracks().forEach(t => t.stop());
  S.stream = null;

  const secs = ((Date.now() - S.t0) / 1000).toFixed(1);
  let icon, title, msg;

  if (reason === 'win') {
    icon = '🎯'; title = 'YOU FOUND IT!';
    msg  = `Located the ${S.target} in ${secs}s — ${S.frames} frames.`;
    $('end-title').style.color = 'var(--success)';
    speak(`Congratulations! Found the ${S.target} in ${secs} seconds!`);
  } else if (reason === 'lose') {
    icon = '🚨'; title = 'GAME OVER';
    msg  = 'A person got too close. Stay safe.';
    $('end-title').style.color = 'var(--danger)';
    speak('Game over. Person too close. Stay safe.');
  } else {
    icon = '⏹'; title = 'STOPPED';
    msg  = `${secs}s elapsed. ${S.frames} frames analysed.`;
    $('end-title').style.color = 'var(--accent)';
  }

  $('end-icon').textContent  = icon;
  $('end-title').textContent = title;
  $('end-msg').textContent   = msg;
  endScreen.style.display    = 'flex';
}

function resetGame() {
  endScreen.style.display   = 'none';
  gameScreen.style.display  = 'none';
  setupScreen.style.display = 'flex';
  $('target-input').value   = '';
}
</script>
