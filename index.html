<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jayded Echo">
<title>Jayded Echo</title>
<style>
:root{
  --bg:#08111f;
  --panel:rgba(10,18,32,.82);
  --line:rgba(120,170,255,.22);
  --accent:#78aaff;
  --good:#4ce08f;
  --warn:#ffcb66;
  --bad:#ff6b6b;
  --text:#edf4ff;
  --muted:rgba(237,244,255,.66);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --head:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --r:18px;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:radial-gradient(circle at top,#11223d 0,#08111f 52%,#050913 100%);color:var(--text);font-family:var(--head)}
button,input{font:inherit}
body{-webkit-tap-highlight-color:transparent;touch-action:manipulation}

#setup,#game,#end{position:fixed;inset:0}
#setup{display:flex;align-items:center;justify-content:center;padding:calc(var(--sat) + 20px) calc(var(--sar) + 18px) calc(var(--sab) + 20px) calc(var(--sal) + 18px);background:linear-gradient(180deg,rgba(8,17,31,.88),rgba(8,17,31,.98))}
.card{width:min(100%,440px);padding:26px;border:1px solid var(--line);background:var(--panel);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(16px)}
.brand{font-size:clamp(2.2rem,8vw,3.6rem);font-weight:900;letter-spacing:-.04em;line-height:1}
.brand span{color:var(--accent)}
.tag{margin-top:8px;color:var(--muted);font-size:.82rem;letter-spacing:.14em;text-transform:uppercase}
.field{margin-top:18px}
.label{display:block;margin-bottom:8px;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
input[type=text]{width:100%;padding:14px 15px;border-radius:14px;border:1px solid rgba(120,170,255,.25);background:rgba(0,0,0,.28);color:var(--text);outline:none}
input[type=text]:focus{border-color:rgba(120,170,255,.55)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.pill,.mode,.start,.retry,.stop{
  border:1px solid rgba(120,170,255,.2);background:rgba(120,170,255,.08);color:var(--text);
  border-radius:14px;padding:12px 12px;cursor:pointer;transition:.15s transform,.15s opacity,.15s background,.15s border-color
}
.pill:hover,.mode:hover,.start:hover,.retry:hover,.stop:hover{transform:translateY(-1px)}
.mode.active{background:rgba(76,224,143,.14);border-color:rgba(76,224,143,.38);color:var(--good)}
.pill{font-size:.9rem}
.row{display:flex;gap:10px;align-items:center}
.start{width:100%;margin-top:18px;background:linear-gradient(135deg,var(--accent),#9bc0ff);color:#07101d;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.small{margin-top:14px;color:var(--muted);font-size:.8rem;line-height:1.5}

#game{display:none}
#cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
#overlay{position:absolute;inset:0;pointer-events:none}
#overlay::before{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent 25%),linear-gradient(to top,rgba(0,0,0,.68),transparent 38%)}
#reticle{position:absolute;left:50%;top:50%;width:130px;height:130px;transform:translate(-50%,-50%);border:1px solid rgba(120,170,255,.2);border-radius:50%;box-shadow:0 0 0 9999px rgba(0,0,0,.03)}
#reticle::before,#reticle::after{content:"";position:absolute;left:50%;top:50%;background:rgba(120,170,255,.78);transform:translate(-50%,-50%)}
#reticle::before{width:58px;height:2px}
#reticle::after{width:2px;height:58px}
#hud{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:calc(var(--sat) + 12px) calc(var(--sar) + 12px) calc(var(--sab) + 12px) calc(var(--sal) + 12px)}
.topbar{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.badge,.panel{background:rgba(10,18,32,.72);border:1px solid var(--line);backdrop-filter:blur(12px);border-radius:16px}
.badge{padding:10px 12px;min-width:0}
.title-mini{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.value{font-family:var(--mono);font-weight:800;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44vw}
.value.good{color:var(--good)}.value.warn{color:var(--warn)}.value.bad{color:var(--bad)}
.lives{display:flex;gap:6px;align-items:center}
.heart{font-size:1.35rem;line-height:1}
.heart.off{opacity:.22}
.bottom{display:flex;flex-direction:column;gap:10px}
.feedback{padding:14px 16px;border-radius:18px;background:rgba(10,18,32,.78);border:1px solid var(--line);font-size:1.05rem;font-weight:800;letter-spacing:-.01em;min-height:52px;display:flex;align-items:center}
.scene{padding:10px 16px;border-radius:14px;background:rgba(10,18,32,.62);border:1px solid rgba(120,170,255,.12);color:var(--muted);font-size:.9rem;min-height:40px;display:flex;align-items:center}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill-state{padding:6px 10px;border-radius:999px;border:1px solid rgba(120,170,255,.18);background:rgba(120,170,255,.08);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(237,244,255,.84)}
.pill-state.ok{border-color:rgba(76,224,143,.38);background:rgba(76,224,143,.12);color:var(--good)}
.pill-state.warn{border-color:rgba(255,203,102,.38);background:rgba(255,203,102,.12);color:var(--warn)}
.pill-state.bad{border-color:rgba(255,107,107,.38);background:rgba(255,107,107,.12);color:var(--bad)}
.meta{display:flex;justify-content:space-between;gap:10px;color:rgba(237,244,255,.44);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase}

#end{display:none;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.86);backdrop-filter:blur(16px)}
.end-card{width:min(100%,480px);padding:28px;border:1px solid var(--line);background:rgba(10,18,32,.9);border-radius:26px;box-shadow:0 24px 90px rgba(0,0,0,.5);text-align:center}
.end-title{font-size:clamp(2rem,8vw,3.2rem);font-weight:900;letter-spacing:-.04em}
.end-msg{margin-top:10px;color:var(--muted);line-height:1.6}
.frame-wrap{display:none;margin:18px auto 0;width:min(100%,320px);border-radius:18px;overflow:hidden;border:2px solid var(--good)}
.frame-wrap.lose{border-color:var(--bad)}
.frame-wrap img{display:block;width:100%;height:auto;max-height:320px;object-fit:cover}
.frame-label{padding:10px;background:rgba(76,224,143,.12);color:var(--good);border-top:1px solid rgba(76,224,143,.18);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}
.frame-wrap.lose .frame-label{background:rgba(255,107,107,.12);color:var(--bad);border-top-color:rgba(255,107,107,.18)}
.end-actions{display:flex;gap:10px;margin-top:18px}
.retry,.stop{flex:1;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.stop{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.28)}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="setup">
  <div class="card">
    <div class="brand">Jayded <span>Echo</span></div>
    <div class="tag">Fast target hunt. Clean audio. No fluff.</div>

    <div class="field">
      <label class="label" for="target-input">Target</label>
      <input id="target-input" type="text" placeholder="Coffee, laptop, phone, keys" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="grid">
        <button class="pill" onclick="selectTarget('Coffee')">Coffee</button>
        <button class="pill" onclick="selectTarget('Laptop')">Laptop</button>
        <button class="pill" onclick="selectTarget('Phone')">Phone</button>
        <button class="pill" onclick="selectTarget('Keys')">Keys</button>
      </div>
    </div>

    <div class="field">
      <label class="label">Difficulty</label>
      <div class="row">
        <button class="mode active" id="mode-easy" onclick="setDifficulty('easy')">Easy</button>
        <button class="mode" id="mode-hard" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>

    <button class="start" onclick="startGame()">Start</button>
    <div class="small">Tip: keep the target in view. Person hits are loud.</div>
  </div>
</div>

<div id="game">
  <video id="cam" autoplay playsinline muted></video>
  <div id="overlay"></div>
  <div id="reticle"></div>

  <div id="hud">
    <div class="topbar">
      <div class="badge">
        <div class="title-mini">Lives</div>
        <div class="lives" id="lives"></div>
      </div>
      <div class="badge" style="max-width:42vw">
        <div class="title-mini">Target</div>
        <div class="value" id="target-tag">—</div>
      </div>
      <div class="badge">
        <div class="title-mini">Mode</div>
        <div class="value" id="difficulty-tag">Easy</div>
      </div>
      <button class="stop" onclick="endGame('stopped')">Stop</button>
    </div>

    <div class="bottom">
      <div class="feedback" id="feedback">Ready.</div>
      <div class="scene" id="scene">Waiting.</div>
      <div class="pills">
        <div class="pill-state" id="pill-target">TARGET: SEARCHING</div>
        <div class="pill-state" id="pill-person">PEOPLE: CLEAR</div>
      </div>
      <div class="meta">
        <span id="frames-stat">Frames 0</span>
        <span id="latency-stat">0ms</span>
      </div>
    </div>
  </div>
</div>

<div id="end">
  <div class="end-card">
    <div class="end-title" id="end-title">Game Over</div>
    <div class="end-msg" id="end-msg"></div>
    <div class="frame-wrap" id="frame-wrap">
      <img id="frame-img" alt="Last frame">
      <div class="frame-label" id="frame-label">Your capture</div>
    </div>
    <div class="end-actions">
      <button class="retry" onclick="restart()">Play again</button>
      <button class="stop" onclick="backToMenu()">Menu</button>
    </div>
  </div>
</div>

<canvas id="snap" class="hidden"></canvas>

<script>
const $ = (id) => document.getElementById(id);
const cam = $('cam');
const snap = $('snap');
const setup = $('setup');
const game = $('game');
const end = $('end');

const PERSON_PENALTY_COOLDOWN = 1200;
const WIN_THRESHOLD = 0.68;
const CLOSE_THRESHOLD = 0.52;
const LATENCY_WARN_MS = 600;
const LATENCY_SILENT_COOLDOWN = 3000;

const S = {
  running: false,
  target: '',
  difficulty: 'easy',
  sessionId: getSessionId(),
  lives: 3,
  maxLives: 3,
  frames: 0,
  stream: null,
  t0: 0,
  score: 0,
  lastPersonPenaltyAt: 0,
  lastWinAt: 0,
  lastWinFrame: null,
  lastLoseFrame: null,
  lastFeedback: '',
  lastSpeechAt: 0,
  lastTargetState: '',
  lastTargetConf: 0,
  lastLatencyWarnAt: 0,
  tick: null,
};

function getSessionId() {
  let sid = localStorage.getItem('jayded_echo_session_id');
  if (!sid) {
    sid = (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : 'sess-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('jayded_echo_session_id', sid);
  }
  return sid;
}

function clamp01(v) {
  v = Number(v);
  return Number.isFinite(v) ? Math.max(0, Math.min(1, v)) : 0;
}

function toConfidence(v) {
  v = Number(v);
  if (!Number.isFinite(v)) return 0;
  if (v > 1) v = v <= 100 ? v / 100 : 1;
  return clamp01(v);
}

function shortWords(text, maxWords = 6) {
  return String(text || '')
    .replace(/[^\w\s-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')
    .filter(Boolean)
    .slice(0, maxWords)
    .join(' ');
}

function normalizeTarget(text) {
  return String(text || '')
    .replace(/[^\w\s-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function getDisplayTarget() {
  return normalizeTarget($('target-input').value);
}

function setDifficulty(level) {
  S.difficulty = level;
  $('mode-easy').classList.toggle('active', level === 'easy');
  $('mode-hard').classList.toggle('active', level === 'hard');
}

function selectTarget(text) {
  $('target-input').value = text;
}

function playTone(freq, duration, type = 'sine', volume = 0.18) {
  try {
    const ctx = playTone.ctx || (playTone.ctx = new (window.AudioContext || window.webkitAudioContext)());
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + duration);
  } catch (_) {}
}

const audio = {
  near() {
    playTone(740, 0.08, 'square', 0.08);
    setTimeout(() => playTone(980, 0.08, 'square', 0.08), 60);
  },
  hit() {
    playTone(180, 0.12, 'sawtooth', 0.18);
    setTimeout(() => playTone(140, 0.16, 'sawtooth', 0.16), 80);
  },
  lowLife() {
    playTone(260, 0.08, 'triangle', 0.1);
    setTimeout(() => playTone(220, 0.10, 'triangle', 0.1), 70);
  },
  win() {
    [[523,0.08],[659,0.08],[784,0.1],[988,0.14]].forEach((n, i) => setTimeout(() => playTone(n[0], n[1], 'triangle', 0.16), i * 110));
  },
  fail() {
    playTone(300, 0.12, 'sawtooth', 0.16);
    setTimeout(() => playTone(170, 0.18, 'sawtooth', 0.14), 90);
  }
};

function speak(text, rate = 1.04, pitch = 1.08) {
  if (!window.speechSynthesis) return;
  const now = Date.now();
  if (now - S.lastSpeechAt < 800) return;
  S.lastSpeechAt = now;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(text));
    u.rate = rate;
    u.pitch = pitch;
    u.volume = 1;
    window.speechSynthesis.speak(u);
  } catch (_) {}
}

function setLives(n) {
  const box = $('lives');
  box.innerHTML = '';
  for (let i = 0; i < S.maxLives; i++) {
    const s = document.createElement('span');
    s.className = 'heart' + (i < n ? '' : ' off');
    s.textContent = '❤';
    box.appendChild(s);
  }
}

function showFeedback(text, kind = 'normal') {
  $('feedback').textContent = text;
  $('feedback').style.color = kind === 'good' ? 'var(--good)' : kind === 'warn' ? 'var(--warn)' : kind === 'bad' ? 'var(--bad)' : 'var(--text)';
  S.lastFeedback = text;
}

function showScene(text) {
  $('scene').textContent = shortWords(text || 'Scanning now.', 6);
}

function setPill(id, state, text) {
  const el = $(id);
  el.className = 'pill-state' + (state ? ' ' + state : '');
  el.textContent = text;
}

function buildNavigationGuidance(analysis, lastConf) {
  const currentConf = Number(analysis.target_confidence) || 0;
  const confChange = currentConf - lastConf;
  const scene = (analysis.scene_description || '').toLowerCase();

  // PRIORITY 1: Check for people/person in scene - DANGER WARNING
  if (scene.includes('person') || scene.includes('people') || scene.includes('standing') || scene.includes('human')) {
    return { guidance: 'Person ahead. Run. Go back.', kind: 'bad', priority: 100 };
  }

  // PRIORITY 2: Check for obstacles and suggest direction
  if (scene.includes('blocked') || scene.includes('wall') || scene.includes('obstacle')) {
    if (scene.includes('left')) {
      return { guidance: 'Blocked. Move right slowly.', kind: 'warn', priority: 90 };
    } else if (scene.includes('right')) {
      return { guidance: 'Blocked. Move left slowly.', kind: 'warn', priority: 90 };
    } else {
      return { guidance: 'Blocked ahead. Turn around.', kind: 'warn', priority: 90 };
    }
  }

  // PRIORITY 3: Clear path - encourage forward movement
  if (scene.includes('clear') || scene.includes('open') || scene.includes('path')) {
    if (currentConf > 0.1) {
      return { guidance: 'Clear ahead. Move forward toward target.', kind: 'good', priority: 50 };
    } else {
      return { guidance: 'Clear path. Move forward.', kind: 'normal', priority: 50 };
    }
  }

  // PRIORITY 4: Target-based guidance (when target found)
  if (currentConf > 0.25 && currentConf < 0.65) {
    if (confChange > 0.03) {
      return { guidance: 'Good direction. Keep forward.', kind: 'good', priority: 40 };
    } else if (confChange < -0.03) {
      return { guidance: 'Wrong way. Turn back.', kind: 'warn', priority: 40 };
    } else {
      return { guidance: 'Hold steady. Small steps.', kind: 'normal', priority: 40 };
    }
  }

  // PRIORITY 5: Very close to winning
  if (currentConf >= 0.65 && currentConf < 0.95) {
    if (confChange > 0.02) {
      return { guidance: 'Almost there. Keep going.', kind: 'good', priority: 40 };
    } else {
      return { guidance: 'Too far now. Come closer.', kind: 'warn', priority: 40 };
    }
  }

  return null;
}


function updateStats() {
  $('frames-stat').textContent = `Frames ${S.frames}`;
}

function captureFrame() {
  if (!cam.videoWidth || !cam.videoHeight) return null;
  const TARGET_W = 480;
  const scale = Math.min(1, TARGET_W / cam.videoWidth);
  snap.width = Math.round(cam.videoWidth * scale);
  snap.height = Math.round(cam.videoHeight * scale);
  snap.getContext('2d').drawImage(cam, 0, 0, snap.width, snap.height);
  return snap.toDataURL('image/jpeg', 0.65);
}

async function startGame() {
  const target = normalizeTarget(getDisplayTarget());
  if (!target) {
    showFeedback('Enter a target first.', 'warn');
    speak('Enter a target first.');
    return;
  }
  S.target = target;
  S.sessionId = getSessionId();

  try {
    await fetch('/reset_session', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: S.sessionId, difficulty: S.difficulty })
    });
  } catch (_) {}

  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 640, max: 960 },
        height: { ideal: 360, max: 540 }
      },
      audio: false
    });
    cam.srcObject = S.stream;
    await cam.play();
  } catch (e) {
    alert('Camera error: ' + e.message);
    return;
  }

  setup.style.display = 'none';
  end.style.display = 'none';
  game.style.display = 'block';

  S.running = true;
  S.frames = 0;
  S.lives = S.maxLives;
  S.score = 0;
  S.lastPersonPenaltyAt = 0;
  S.lastWinAt = 0;
  S.lastWinFrame = null;
  S.lastLoseFrame = null;
  S.lastSpeechAt = 0;
  S.lastTargetConf = 0;
  S.lastLatencyWarnAt = 0;
  S.t0 = Date.now();
  setLives(S.lives);
  $('target-tag').textContent = target.toUpperCase();
  $('difficulty-tag').textContent = S.difficulty === 'easy' ? 'Easy' : 'Hard';
  showFeedback('Scanning for target.', 'normal');
  showScene('Waiting for first frame.');
  setPill('pill-target', '', 'TARGET: SEARCHING');
  setPill('pill-person', '', 'PEOPLE: CLEAR');

  speak(`Jayded Echo started. Looking for ${target}.`);

  S.tick = setInterval(updateStats, 250);
  loop();
}

async function loop() {
  let inflight = false;
  while (S.running) {
    if (inflight) {
      await sleep(50);
      continue;
    }
    const img = captureFrame();
    if (!img) {
      await sleep(120);
      continue;
    }

    S.frames += 1;
    updateStats();

    inflight = true;
    const start = Date.now();
    let data = null;
    try {
      const r = await fetch('/analyse', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          image: img,
          target: S.target,
          session_id: S.sessionId,
          difficulty: S.difficulty
        })
      });
      data = await r.json();
      const latency = Date.now() - start;
      $('latency-stat').textContent = `${latency}ms`;

      // Latency warning: suggest slowing down if lag is detected
      if (latency > LATENCY_WARN_MS) {
        const now = Date.now();
        if (now - S.lastLatencyWarnAt > LATENCY_SILENT_COOLDOWN) {
          S.lastLatencyWarnAt = now;
          showFeedback('Camera lag detected. Slow down.', 'warn');
          // No speak() call to avoid audio spam
        }
      }
    } catch (e) {
      showFeedback('Connection problem. Retrying.', 'warn');
      inflight = false;
      await sleep(500);
      continue;
    }
    inflight = false;

    if (!S.running) break;
    if (applyAnalysis(data)) break;
    await sleep(150);
  }
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function endGame(reason = 'stopped') {
  if (!S.running && reason !== 'stopped') return;
  S.running = false;
  clearInterval(S.tick);
  S.tick = null;
  try { window.speechSynthesis?.cancel(); } catch (_) {}
  if (S.stream) {
    S.stream.getTracks().forEach(t => t.stop());
    S.stream = null;
  }

  const secs = ((Date.now() - S.t0) / 1000).toFixed(1);
  const fw = $('frame-wrap');
  const fi = $('frame-img');
  const fl = $('frame-label');

  if (reason === 'win') {
    $('end-title').textContent = 'Target Found';
    $('end-title').style.color = 'var(--good)';
    $('end-msg').textContent = `Captured in ${secs}s across ${S.frames} frames.`;
    fw.className = 'frame-wrap';
    fl.textContent = 'Target locked — winning frame';
    if (S.lastWinFrame) { fi.src = S.lastWinFrame; fw.style.display = 'block'; } else { fw.style.display = 'none'; }
    audio.win();
  } else if (reason === 'lose') {
    $('end-title').textContent = 'Game Over';
    $('end-title').style.color = 'var(--bad)';
    $('end-msg').textContent = `Person detected. Final score ${S.score}.`;
    fw.className = 'frame-wrap lose';
    fl.textContent = 'Person detected — fatal frame';
    if (S.lastLoseFrame) { fi.src = S.lastLoseFrame; fw.style.display = 'block'; } else { fw.style.display = 'none'; }
    audio.fail();
  } else {
    $('end-title').textContent = 'Stopped';
    $('end-title').style.color = 'var(--accent)';
    $('end-msg').textContent = `Stopped after ${secs}s and ${S.frames} frames.`;
    fw.style.display = 'none';
  }

  end.style.display = 'flex';
}

function backToMenu() {
  end.style.display = 'none';
  game.style.display = 'none';
  setup.style.display = 'flex';
  $('target-input').value = '';
}

function restart() {
  end.style.display = 'none';
  startGame();
}

function applyAnalysis(a) {
  if (!S.running) return true;
  if (!a || typeof a !== 'object') {
    showFeedback('Bad analysis response.', 'warn');
    return false;
  }
  if (a.error) {
    showFeedback(shortWords(a.error, 6), 'warn');
    return false;
  }

  const targetFound = !!a.target_found;
  const targetConf = toConfidence(a.target_confidence);
  const personFound = !!a.person_detected;
  const personConf = toConfidence(a.person_confidence);
  const scene = shortWords(a.scene_description || 'Scanning.', 6);

  showScene(scene);

  const now = Date.now();

  // CONTINUOUS NAVIGATION GUIDANCE (based on scene description + target detection)
  const navGuidance = buildNavigationGuidance(a, S.lastTargetConf);
  if (navGuidance) {
    showFeedback(navGuidance.guidance, navGuidance.kind);
    // Speak guidance occasionally (not every frame, respect cooldown)
    if (now - S.lastSpeechAt >= 1000) {
      speak(navGuidance.guidance);
    }
  }
  S.lastTargetConf = targetConf;

  if (personFound) {
    // Capture the frame immediately — before any await — so it reflects the moment of detection
    const hitFrame = captureFrame();
    setPill('pill-person', 'bad', `PEOPLE: ${Math.round(personConf * 100)}%`);
    if (now - S.lastPersonPenaltyAt >= PERSON_PENALTY_COOLDOWN) {
      S.lastPersonPenaltyAt = now;
      S.lives -= 1;
      setLives(S.lives);
      audio.hit();
      if (S.lives <= 0) {
        // Store the fatal frame before ending
        S.lastLoseFrame = hitFrame;
        showFeedback('Person detected. Out.', 'bad');
        speak('Out. Person detected.');
        endGame('lose');
        return true;
      } else if (S.lives <= 1) {
        showFeedback('Oof. One life left.', 'bad');
        speak('Oof. One life left.');
        audio.lowLife();
      } else {
        showFeedback(`You got hit. ${S.lives} left.`, 'warn');
        speak(`You got hit. ${S.lives} left.`);
      }
    } else {
      showFeedback('Person nearby. Back up.', 'warn');
    }
    setPill('pill-target', targetFound ? 'warn' : '', targetFound ? `TARGET: ${Math.round(targetConf * 100)}%` : 'TARGET: SEARCHING');
    return false;
  } else {
    setPill('pill-person', '', 'PEOPLE: CLEAR');
  }

  // Update target pill based on current detection
  if (targetFound) {
    const pct = Math.round(targetConf * 100);
    setPill('pill-target', targetConf >= CLOSE_THRESHOLD ? 'ok' : 'warn', `TARGET: ${pct}%`);
  } else {
    setPill('pill-target', '', 'TARGET: SEARCHING');
  }

  if (targetFound && targetConf >= WIN_THRESHOLD && now - S.lastWinAt > 1200) {
    S.lastWinAt = now;
    S.lastWinFrame = captureFrame();
    showFeedback('Target secured. Let’s go.', 'good');
    speak('Let us go. Target secured.');
    endGame('win');
    return true;
  }

  return false;
}

window.addEventListener('load', () => {
  setLives(S.maxLives);
  $('difficulty-tag').textContent = 'Easy';
});
</script>
