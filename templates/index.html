<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaydeEcho - Voice Navigation Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }

        .status-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .status-card.active {
            border-left-color: #51cf66;
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
        }

        .status-label {
            font-weight: 700;
            color: #333;
            display: block;
            margin-bottom: 4px;
        }

        .status-value {
            color: #666;
            font-size: 11px;
        }

        section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        button {
            padding: 14px 18px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: #667eea;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-game {
            background: #ff6b6b;
            color: white;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .image-display {
            margin: 15px 0;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            background: #f0f0f0;
        }

        .image-display.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .image-display img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
        }

        .response-box {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            line-height: 1.6;
            color: #333;
            font-size: 15px;
        }

        .response-box.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .response-box.error {
            background: #ffe0e0;
            border-left-color: #ff6b6b;
            color: #c92a2a;
        }

        .response-box.success {
            background: #e6f9ff;
            border-left-color: #51cf66;
            color: #0c4a6e;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .game-controls {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            border: 2px solid #ffc107;
        }

        .game-controls.active {
            display: block;
        }

        .direction-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .direction-buttons button {
            padding: 10px;
            font-size: 12px;
            margin: 0;
            background: #ffc107;
            color: #333;
        }

        .emoji {
            font-size: 20px;
        }

        .info-box {
            background: #e7f5ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #0c4a6e;
            margin: 10px 0;
        }

        .location-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }

            h1 {
                font-size: 28px;
            }

            h2 {
                font-size: 16px;
            }

            button {
                padding: 12px 15px;
                font-size: 14px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .status-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ JaydeEcho</h1>
            <p class="subtitle">AI-Powered Navigation Assistant for All</p>
        </header>

        <div class="status-grid">
            <div class="status-card" id="visionCard">
                <span class="status-label">👁️ Vision</span>
                <span class="status-value" id="visionStatus">Loading...</span>
            </div>
            <div class="status-card" id="speechCard">
                <span class="status-label">🔊 Speech</span>
                <span class="status-value" id="speechStatus">Loading...</span>
            </div>
            <div class="status-card" id="cameraCard">
                <span class="status-label">📷 Camera</span>
                <span class="status-value" id="cameraStatus">Loading...</span>
            </div>
            <div class="status-card" id="locationCard">
                <span class="status-label">📍 Location</span>
                <span class="status-value" id="locationStatus">Loading...</span>
            </div>
        </div>

        <!-- Camera Selection -->
        <section id="cameraSection" style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
            <h2>📷 Camera Settings</h2>
            <div class="input-group">
                <label>Select Camera Device:</label>
                <select id="cameraSelect" onchange="switchCamera()">
                    <option value="">Loading cameras...</option>
                </select>
                <small style="color: #666; margin-top: 8px; display: block;">Your Logitech Brio should appear here</small>
            </div>
            <button class="btn-secondary" onclick="toggleLiveStream()" style="width: 100%; margin-top: 10px;">🎥 Show Live Stream</button>

            <!-- Live Stream Display -->
            <div id="liveStreamContainer" style="display: none; margin-top: 15px;">
                <div style="background: #000; border-radius: 10px; overflow: hidden; position: relative;">
                    <img id="liveStreamImage" src="" alt="Live Stream" style="width: 100%; height: auto; display: block;" />
                    <div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 8px 12px; border-radius: 5px; font-family: monospace; font-size: 12px;">
                        🔴 LIVE
                    </div>
                </div>
                <button class="btn-secondary" onclick="toggleLiveStream()" style="width: 100%; margin-top: 10px;">✓ Hide Live Stream</button>
            </div>
        </section>

        <!-- Navigation Section -->
        <section>
            <h2>🗺️ Navigation</h2>
            <div class="input-group">
                <label>Where would you like to go?</label>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="destination" placeholder="e.g., Toronto, Times Square, Café" />
                    <button onclick="useCurrentLocation()" style="flex: 0.3; background: #667eea; color: white;">📍</button>
                </div>
                <button class="btn-primary" onclick="navigate()">Get Directions</button>
            </div>
        </section>

        <!-- Vision Section -->
        <section>
            <h2>📸 Scene Analysis</h2>
            <div class="button-group">
                <button class="btn-secondary" onclick="describeScene()">📸 Describe Scene</button>
                <button class="btn-secondary" onclick="askQuestionToggle()">❓ Ask Question</button>
            </div>

            <div class="image-display" id="imageDisplay">
                <img id="capturedImage" alt="Scene" />
            </div>

            <div class="input-group" id="questionSection" style="display: none;">
                <label>Ask about your surroundings:</label>
                <input type="text" id="question" placeholder="e.g., Is there a clear path? Where's the door?" />
                <button class="btn-secondary" onclick="submitQuestion()" style="width: 100%; margin-top: 10px;">Submit</button>
            </div>
        </section>

        <!-- Search Mode Section -->
        <section>
            <h2>🔍 Find Object</h2>
            <div class="input-group">
                <label>Search for something specific:</label>
                <input type="text" id="searchQuery" placeholder="e.g., chair, door, window, person" />
            </div>
            <button class="btn-primary" onclick="searchObject()">Search</button>

            <div id="searchStatus" style="display: none; margin-top: 15px;">
                <div class="response-box" id="searchResponse" style="display: block;">
                    <div id="searchResponseText"></div>
                </div>
                <div id="searchControls" style="margin-top: 15px;">
                    <div class="button-group" style="grid-template-columns: 1fr 1fr; margin: 0;">
                        <button class="btn-secondary" onclick="continueSearch()" id="searchRetryBtn">🔍 Search Again</button>
                        <button class="btn-secondary" onclick="closeSearch()" id="searchCloseBtn">✓ Done</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Game Section -->
        <section>
            <h2>🎮 Games</h2>
            <div class="input-group">
                <select id="gameType">
                    <option value="floor_is_lava">🌋 Floor is Lava</option>
                    <option value="obstacle_course">🏃 Obstacle Course</option>
                    <option value="sound_hunt">🔍 Sound Hunt</option>
                </select>
            </div>
            <button class="btn-game" onclick="startGame()">Start Game</button>
            <div class="game-controls" id="gameControls">
                <h3>Game Controls</h3>
                <div class="direction-buttons">
                    <button onclick="gameMove('left', 0.5)">⬅️ Left</button>
                    <button onclick="gameMove('forward', 1.0)">⬆️ Forward</button>
                    <button onclick="gameMove('right', 0.5)">➡️ Right</button>
                    <button onclick="gameMove('left', 1.0)" style="font-size: 11px;">⬅️⬅️</button>
                    <button onclick="endGame()" style="background: #dc3545;">Stop</button>
                    <button onclick="gameMove('right', 1.0)" style="font-size: 11px;">➡️➡️</button>
                </div>
            </div>
        </section>

        <!-- Response Display -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            Processing...
        </div>

        <div class="response-box" id="responseBox">
            <div id="responseText"></div>
        </div>
    </div>

    <script>
        let currentLocation = null;

        // Load initial status
        async function loadStatus() {
            try {
                const response = await fetch("/api/status");
                const data = await response.json();

                updateStatusCard("visionCard", data.vision_backend || "Unavailable", data.vision_backend ? "active" : "");
                updateStatusCard("speechCard", data.speech_available ? "Ready ✓" : "Unavailable", data.speech_available ? "active" : "");
                updateStatusCard("cameraCard", data.camera_ready ? "Ready ✓" : "Not found", data.camera_ready ? "active" : "");

                // Get user location
                getLocationStatus();

                // Load available cameras
                loadCameraList();
            } catch (error) {
                console.error("Status error:", error);
            }
        }

        async function loadCameraList() {
            try {
                const response = await fetch("/api/cameras");
                const data = await response.json();

                const select = document.getElementById("cameraSelect");
                select.innerHTML = "";

                if (data.cameras && data.cameras.length > 0) {
                    data.cameras.forEach(cam => {
                        const option = document.createElement("option");
                        option.value = cam.id;
                        option.textContent = `Camera ${cam.id} - ${cam.resolution} @ ${cam.fps}fps`;
                        select.appendChild(option);
                    });
                } else {
                    const option = document.createElement("option");
                    option.textContent = "No cameras found";
                    option.disabled = true;
                    select.appendChild(option);
                }
            } catch (error) {
                console.error("Camera list error:", error);
            }
        }

        async function switchCamera() {
            const deviceId = parseInt(document.getElementById("cameraSelect").value);
            if (isNaN(deviceId)) return;

            try {
                const response = await fetch("/api/camera/switch", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ device_id: deviceId })
                });
                const data = await response.json();

                if (data.success) {
                    showNotification(`✓ Switched to Camera ${deviceId}`);
                    // Reset live stream
                    stopLiveStream();
                } else {
                    showNotification(data.error || "Failed to switch camera", true);
                }
            } catch (error) {
                showNotification("Error: " + error.message, true);
            }
        }

        let liveStreamInterval = null;

        function toggleLiveStream() {
            const container = document.getElementById("liveStreamContainer");
            if (container.style.display === "none") {
                startLiveStream();
            } else {
                stopLiveStream();
            }
        }

        function startLiveStream() {
            const container = document.getElementById("liveStreamContainer");
            container.style.display = "block";

            // Update frame every 500ms
            liveStreamInterval = setInterval(updateLiveFrame, 500);
            updateLiveFrame(); // Initial frame
        }

        async function updateLiveFrame() {
            try {
                const response = await fetch("/api/stream/frame");
                const data = await response.json();

                if (data.frame) {
                    document.getElementById("liveStreamImage").src = data.frame;
                }
            } catch (error) {
                console.error("Stream error:", error);
            }
        }

        function stopLiveStream() {
            const container = document.getElementById("liveStreamContainer");
            container.style.display = "none";

            if (liveStreamInterval) {
                clearInterval(liveStreamInterval);
                liveStreamInterval = null;
            }
        }

        function updateStatusCard(elementId, status, activeClass) {
            const card = document.getElementById(elementId);
            const statusEl = card.querySelector(".status-value");
            statusEl.textContent = status;
            if (activeClass) {
                card.classList.add("active");
            }
        }

        function getLocationStatus() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        document.getElementById("locationStatus").textContent = "Ready ✓";
                        document.getElementById("locationCard").classList.add("active");
                    },
                    () => {
                        document.getElementById("locationStatus").textContent = "Denied";
                    }
                );
            }
        }

        function useCurrentLocation() {
            if (currentLocation) {
                document.getElementById("destination").value = `${currentLocation.lat.toFixed(4)}, ${currentLocation.lng.toFixed(4)}`;
                showNotification("📍 Using your current location");
            } else {
                showNotification("Location not available", true);
            }
        }

        async function showResponse(data, imageUrl = null, isError = false) {
            const box = document.getElementById("responseBox");
            const text = document.getElementById("responseText");
            text.textContent = data;
            box.className = `response-box active ${isError ? "error" : "success"}`;
            document.getElementById("loading").classList.remove("active");

            if (imageUrl) {
                const imgDisplay = document.getElementById("imageDisplay");
                const img = document.getElementById("capturedImage");
                img.src = imageUrl;
                imgDisplay.classList.add("active");
            }

            window.scrollTo(0, document.body.scrollHeight);
        }

        function showNotification(message, isError = false) {
            showResponse(message, null, isError);
        }

        async function navigate() {
            const destination = document.getElementById("destination").value;
            if (!destination.trim()) {
                showNotification("Please enter a destination or click 📍", true);
                return;
            }

            document.getElementById("loading").classList.add("active");
            try {
                const response = await fetch("/api/navigate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ destination })
                });
                const data = await response.json();

                if (response.ok) {
                    showResponse(data.response);
                } else {
                    showResponse(data.error || "Navigation failed", null, true);
                }
            } catch (error) {
                showResponse("Error: " + error.message, null, true);
            }
        }

        async function describeScene() {
            document.getElementById("loading").classList.add("active");
            try {
                const response = await fetch("/api/describe", { method: "POST" });
                const data = await response.json();

                if (response.ok) {
                    showResponse(data.response, data.image);
                } else {
                    showResponse(data.error || "Failed to describe scene", null, true);
                }
            } catch (error) {
                showResponse("Error: " + error.message, null, true);
            }
        }

        function askQuestionToggle() {
            const section = document.getElementById("questionSection");
            section.style.display = section.style.display === "none" ? "block" : "none";
            if (section.style.display === "block") {
                document.getElementById("question").focus();
            }
        }

        async function submitQuestion() {
            const question = document.getElementById("question").value;
            if (!question.trim()) {
                showNotification("Please ask a question", true);
                return;
            }

            document.getElementById("loading").classList.add("active");
            try {
                const response = await fetch("/api/query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: question })
                });
                const data = await response.json();

                if (response.ok) {
                    showResponse(data.response, data.image);
                } else {
                    showResponse(data.error || "Failed to process question", null, true);
                }
            } catch (error) {
                showResponse("Error: " + error.message, null, true);
            }
        }

        async function startGame() {
            const gameType = document.getElementById("gameType").value;
            document.getElementById("loading").classList.add("active");

            try {
                const response = await fetch("/api/game/start", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ game: gameType })
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById("gameControls").classList.add("active");
                    showResponse(data.response);
                } else {
                    showResponse(data.error || "Failed to start game", null, true);
                }
            } catch (error) {
                showResponse("Error: " + error.message, null, true);
            }
        }

        async function gameMove(direction, distance) {
            try {
                const response = await fetch("/api/game/move", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ direction, distance })
                });
                const data = await response.json();

                if (response.ok) {
                    showResponse(data.response);
                } else {
                    showResponse(data.error || "Game move failed", null, true);
                }
            } catch (error) {
                showResponse("Error: " + error.message, null, true);
            }
        }

        async function endGame() {
            try {
                const response = await fetch("/api/game/end", { method: "POST" });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById("gameControls").classList.remove("active");
                    showResponse(data.response);
                } else {
                    showResponse(data.error || "Failed to end game", null, true);
                }
            } catch (error) {
                showResponse("Error: " + error.message, null, true);
            }
        }

        // Keyboard shortcuts
        document.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                if (document.getElementById("destination") === document.activeElement) {
                    navigate();
                } else if (document.getElementById("question") === document.activeElement) {
                    submitQuestion();
                } else if (document.getElementById("searchQuery") === document.activeElement) {
                    searchObject();
                }
            }
        });

        // Search Mode Functions
        let currentSearchQuery = "";

        async function searchObject() {
            const query = document.getElementById("searchQuery").value.trim();
            if (!query) {
                showNotification("What are you looking for?", true);
                return;
            }

            currentSearchQuery = query;
            document.getElementById("loading").classList.add("active");
            document.getElementById("searchStatus").style.display = "none";

            try {
                const response = await fetch("/api/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById("loading").classList.remove("active");
                    showSearchResult(data);
                } else {
                    showNotification(data.error || "Search failed", true);
                }
            } catch (error) {
                showNotification("Error: " + error.message, true);
            }
        }

        function showSearchResult(data) {
            const statusDiv = document.getElementById("searchStatus");
            const responseDiv = document.getElementById("searchResponse");
            const responseText = document.getElementById("searchResponseText");
            const searchQuery = document.getElementById("searchQuery");
            const retryBtn = document.getElementById("searchRetryBtn");

            // Update UI
            responseText.innerHTML = data.response.replace(/\n/g, "<br>");
            responseDiv.className = `response-box active ${data.found ? "success" : "error"}`;

            // Update button text
            if (data.found) {
                retryBtn.textContent = "🔍 Search for Something Else";
                searchQuery.style.display = "block";
            } else {
                retryBtn.textContent = "🔍 Try Again (New Picture)";
            }

            // Show status and controls
            statusDiv.style.display = "block";

            // Display image
            const imgDisplay = document.getElementById("imageDisplay");
            const img = document.getElementById("capturedImage");
            img.src = data.image;
            imgDisplay.classList.add("active");

            window.scrollTo(0, document.body.scrollHeight);
        }

        async function continueSearch() {
            if (!currentSearchQuery) return;

            document.getElementById("loading").classList.add("active");

            try {
                const response = await fetch("/api/search/continue", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: currentSearchQuery })
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById("loading").classList.remove("active");
                    showSearchResult(data);
                } else {
                    showNotification(data.error || "Search failed", true);
                }
            } catch (error) {
                showNotification("Error: " + error.message, true);
            }
        }

        function closeSearch() {
            document.getElementById("searchStatus").style.display = "none";
            document.getElementById("searchQuery").value = "";
            currentSearchQuery = "";
            showNotification("Search complete! Ready for next search.");
        }

        // Load status on page load
        loadStatus();
    </script>
</body>
</html>
